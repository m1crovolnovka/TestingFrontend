name: Full Stack Library CI

on: [push, pull_request]

jobs:
  # Объединяем тесты бэкенда и фронтенда, так как UI-тестам нужен запущенный сервер
  test-and-report:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # На Windows запуск фоновых процессов в bash сложнее, для лабы хватит Ubuntu
        node: [20]
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: library_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Склонировать оба репозитория
      - name: Checkout Frontend
        uses: actions/checkout@v4

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: m1crovolnovka/TestingBackend
          token: ${{ secrets.GH_PAT }}
          path: backend-repo

      # 2. Настроить окружение
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # 3. Установить зависимости
      - name: Install Frontend Deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 4. Прогнать Unit-тесты бэкенда (проверка из задания)
      - name: Run Backend Unit Tests
        run: mvn test
        working-directory: ./backend-repo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/library_db
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password

      # 5. Сборка JAR-файла (чтобы запуск был мгновенным)
      - name: Package Backend
        run: mvn clean package -DskipTests
        working-directory: ./backend-repo

      # 6. ЗАПУСК ГОТОВОГО JAR В ФОНЕ
      - name: Start Backend Server
        run: |
          # Находим созданный jar и запускаем его напрямую через java
          java -jar target/*.jar --server.port=8082 > backend.log 2>&1 &
          echo "Backend application is starting..."
        working-directory: ./backend-repo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/library_db
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password

      # 7. ОЖИДАНИЕ (используем проверку только порта или принимаем любой HTTP код)
      - name: Wait for Backend API
        run: |
          # Флаг --httpStatusCode позволяет принимать 404 как успешный запуск
          npx wait-on http://localhost:8082 --timeout 60000 

      # 8. Запуск UI тестов
      - name: Run UI Tests
        run: npm run test
        env:
          JAVA_API_URL: http://localhost:8082

      # 8. Сбор результатов для Allure
      - name: Save Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  # --- ОТЧЕТЫ И TELEGRAM ---
  report-and-notify:
    needs: test-and-report
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            CI Status: ${{ needs.test-and-report.result }}
            Project: ${{ github.repository }}
            Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/