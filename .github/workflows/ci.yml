name: Full Stack Library CI

on: [push, pull_request]

permissions:
  contents: write

jobs:
  # 1. Проверка синтаксиса пайплайна
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

  # 2. Основные тесты
  test-and-report:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest] # Добавили ОС по заданию
        node: [18, 20, 22] # Матрица версий Node.js
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: library_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: m1crovolnovka/TestingBackend
          token: ${{ secrets.GH_PAT }}
          path: backend-repo

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # --- КЭШИРОВАНИЕ ---
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Frontend Deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # --- ТЕСТЫ БЭКЕНДА ---
      - name: Run Backend Unit Tests
        run: mvn test
        working-directory: ./backend-repo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/library_db
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password

      # --- ЗАПУСК И UI ТЕСТЫ (Только на Ubuntu для стабильности порта) ---
      - name: Build and Run Full Stack Tests
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Собираем JAR
          mvn clean package -DskipTests
          # Запускаем
          java -jar target/*.jar --server.port=8082 > backend.log 2>&1 &
          
          # Ожидание порта
          timeout 60s bash -c 'until curl -s localhost:8082 > /dev/null; do sleep 2; done'
          
          # Seed DB
          PGPASSWORD=password psql -h localhost -U user -d library_db -c "TRUNCATE TABLE books; INSERT INTO books (id, daily_rate, days_overdue, is_returned) VALUES (101, 2.0, 5, false), (102, 2.0, 0, false), (103, 2.0, 10, false), (104, 2.0, 1, false);"
          
          # UI тесты
          npm run test
        working-directory: ./backend-repo
        env:
          JAVA_API_URL: http://localhost:8082

      # --- СБОР РЕЗУЛЬТАТОВ ---
      - name: Combine Allure Results
        if: always()
        shell: bash
        run: |
          mkdir -p combined-results
          # Фронтенд
          [ -d allure-results ] && cp -r allure-results/* combined-results/ || echo "No frontend results"
          # Бэкенд (Путь зависит от настроек allure-maven)
          [ -d backend-repo/target/allure-results ] && cp -r backend-repo/target/allure-results/* combined-results/ || echo "No backend results"

      - name: Upload Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}-${{ matrix.node }}
          path: combined-results/

  # 3. ГЕНЕРАЦИЯ ОТЧЕТА И УВЕДОМЛЕНИЕ
  report-and-notify:
    needs: test-and-report
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: all-raw-results
          merge-multiple: true

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate all-raw-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Pipeline Finished!
            Status: ${{ needs.test-and-report.result }}
            OS: Ubuntu, Windows, Mac (Matrix)
            Node: 18, 20, 22
            Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/