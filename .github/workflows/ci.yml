name: Full Stack Library CI

on: [push, pull_request]

permissions:
  contents: write

jobs:
  # 1. Проверка синтаксиса пайплайна
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

  # 2. Основные тесты
  test-and-report:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}

    # Запускаем базу только если ОС — Linux
    services:
      postgres:
        image: ${{ matrix.os == 'ubuntu-latest' && 'postgres:15' || '' }}
        env:
          POSTGRES_DB: library_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Убираем жесткую привязку, если это не Ubuntu
        options: >-
          ${{ matrix.os == 'ubuntu-latest' && '--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5' || '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: m1crovolnovka/TestingBackend
          token: ${{ secrets.GH_PAT }}
          path: backend-repo

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install Deps
        run: |
          npm ci
          npx playwright install --with-deps

      # --- 1. ТЕСТЫ БЭКЕНДА (Идут на всех ОС) ---
      - name: Run Backend Unit Tests
        run: mvn test -Dskip.installnodedeps=true 
        working-directory: ./backend-repo
        # На Windows/Mac тесты пройдут, если они не требуют живого Postgres 
        # (или используют H2/Mock). Если требуют Postgres — добавим условие if.
        if: matrix.os == 'ubuntu-latest' 

      # --- 2. FULL STACK ТЕСТЫ (ТОЛЬКО НА LINUX) ---
      - name: Full Stack UI Testing
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Сборка
          mvn clean package -DskipTests
          
          # Запуск
          java -jar target/*.jar --server.port=8082 > backend.log 2>&1 &
          
          # Ждем, пока проснется (увеличим лог для отладки)
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:8082 > /dev/null; then
              echo "Backend is UP!"
              break
            fi
            echo "Attempt $i: Backend is still sleeping..."
            sleep 3
          done

          # Seed DB
          PGPASSWORD=password psql -h localhost -U user -d library_db -c "TRUNCATE TABLE books; INSERT INTO books (id, daily_rate, days_overdue, is_returned) VALUES (101, 2.0, 5, false), (102, 2.0, 0, false), (103, 2.0, 10, false), (104, 2.0, 1, false);"
          
          # Тесты
          npm run test
        working-directory: ./backend-repo
        env:
          JAVA_API_URL: http://localhost:8082

      # --- 3. СБОР РЕЗУЛЬТАТОВ ---
      - name: Combine Allure Results
        if: always()
        shell: bash
        run: |
          mkdir -p combined-results
          
          # Вместо [ -d A ] && cp A B || echo "no", используем чистые проверки:
          if [ -d "allure-results" ]; then
            cp -r allure-results/* combined-results/
          fi
          
          if [ -d "backend-repo/target/allure-results" ]; then
            cp -r backend-repo/target/allure-results/* combined-results/
          fi
          
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}-${{ matrix.node }}
          path: combined-results/

  # 3. ГЕНЕРАЦИЯ ОТЧЕТА И УВЕДОМЛЕНИЕ
  report-and-notify:
    needs: test-and-report
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: all-raw-results
          merge-multiple: true

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate all-raw-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Заменил v3 на v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Pipeline Finished!
            Status: ${{ needs.test-and-report.result }}
            OS: Ubuntu, Windows, Mac (Matrix)
            Node: 18, 20, 22
            Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/