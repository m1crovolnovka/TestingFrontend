name: Full Stack Library CI

on: [push, pull_request]

jobs:
  # --- РАБОТА 1: ТЕСТЫ БЭКЕНДА ---
  backend-tests:
    runs-on: ubuntu-latest
    # Запускаем базу данных в Docker
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: library_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Ждем, пока база станет доступна
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: m1crovolnovka/TestingBackend
          token: ${{ secrets.GH_PAT }}
          path: backend-repo

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend Tests
        run: mvn test
        working-directory: ./backend-repo
        env:
          # Переопределяем настройки подключения для тестов
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/library_db
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # --- РАБОТА 2: ТЕСТЫ ФРОНТЕНДА (UI) ---
  ui-tests:
    needs: backend-tests # Запуск только после успеха бэкенда
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run UI Tests
        run: npm run test
        env:
          JAVA_API_URL: http://localhost:8082 # Переменная для тестов

      - name: Save Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}
          path: allure-results/

  # --- РАБОТА 3: ОТЧЕТЫ И TELEGRAM ---
  report-and-notify:
    needs: ui-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate all-results/*/allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            CI Status: ${{ needs.ui-tests.result }}
            Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/